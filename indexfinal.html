<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Treino Cognitivo - Estável</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="https://unpkg.com/ml5@1.2.1/dist/ml5.min.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="loading-screen">
            <h2>A CARREGAR CÂMARA...</h2>
            <div class="loader"></div>
        </div>

        <div id="menu" style="display: none;">
            <h1>TREINO DE REAÇÃO</h1>
            <div class="button-group">
                <button onclick="startGame('easy')">FÁCIL</button>
                <button onclick="startGame('medium')">MÉDIO</button>
                <button onclick="startGame('hard')">DIFÍCIL</button>
                <button id="btn-exit" onclick="location.reload()">SAIR</button>
            </div>
        </div>

        <div id="hud" style="display: none;">
            <div id="top-bar">
                <div id="target-display">TOCA NO: <span id="target-name">-</span></div>
                <div class="stats">
                    Tempo: <span id="timer">0</span>s | 
                    Acertos: <span id="correct-count">0</span> | 
                    Errados: <span id="wrong-count">0</span>
                </div>
            </div>
        </div>

        <div id="results-screen" class="overlay" style="display: none;">
            <h2>RESULTADOS FINAIS</h2>
            <div class="final-stats">
                <p>Acertos: <span id="final-correct">0</span></p>
                <p>Errados: <span id="final-wrong">0</span></p>
            </div>
            <button onclick="backToMenu()">VOLTAR AO MENU</button>
        </div>
    </div>
    <script src="sketchfinal.js"></script>
</body>
</html>
