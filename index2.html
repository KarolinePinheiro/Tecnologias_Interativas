<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="estilos.css">
    <script src="gamification.js"></script>
</head>
<body>
    <div id="game-container">
  <div id="menu">
    <h1>TREINO DE REAÇÃO</h1>
    <p>Escolhe a dificuldade:</p>
    
    <div class="button-group">
      <button onclick="startGame('easy')">FÁCIL</button>
      <button onclick="startGame('medium')">MÉDIO</button>
      <button onclick="startGame('hard')">DIFÍCIL</button>
      <button id="btn-inst" onclick="showInstructions()">INSTRUÇÕES</button>
    </div>
    <p id="error-msg" style="color: #ff5050; display: none;">Ficheiro não encontrado</p>
  </div>

  <div id="hud" style="display: none;">
    <div id="stats">
      <p>Pontos: <span id="score">0</span></p>
      <p>Tempo: <span id="timer">30</span>s</p>
    </div>
    <h2 id="instruction-text">TOCA NO VERMELHO</h2>
  </div>

  <canvas id="gameCanvas" width="600" height="500"></canvas>
</div>
</body>
</html>
