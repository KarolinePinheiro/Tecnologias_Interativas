<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino de Reação - Menu Profissional</title>
    <link rel="stylesheet" href="styles.css">
    <script src="gamification.js" defer></script>
</head>
<body>

    <div id="game-container">
        <div id="menu">
            <h1>TREINO DE REAÇÃO</h1>
            <p>Escolhe a dificuldade:</p>
            <div class="button-group">
                <button onclick="startGame('easy')">FÁCIL</button>
                <button onclick="startGame('medium')">MÉDIO</button>
                <button onclick="startGame('hard')">DIFÍCIL</button>
                <button id="btn-inst" onclick="showInstructions()">INSTRUÇÕES</button>
                <button id="btn-exit" onclick="exitApp()">EXIT</button>
            </div>
            <p id="error-msg" style="display: none; color: #ff5050; margin-top: 15px;">Ficheiro de instruções não encontrado</p>
        </div>

        <div id="hud" style="display: none;">
            <div id="top-bar">
                <div class="controls">
                    <button class="small-btn" onclick="backToMenu()">VOLTAR</button>
                    <button id="pause-btn" class="small-btn" onclick="togglePause()">PAUSA</button>
                </div>
                <div class="level-info">
                    Nível: <span id="level-name">-</span>
                </div>
            </div>

            <div id="stats-display">
                <div class="stat-group">
                    <p>Tempo: <span id="timer">0</span>s</p>
                    <p>Pontos: <span id="score">0</span></p>
                </div>
                <div class="stat-group" style="text-align: right;">
                    <p>Certos: <span id="correct">0</span></p>
                    <p>Errados: <span id="wrong">0</span></p>
                </div>
            </div>

            <h2 id="instruction-text">PREPARA-TE...</h2>
        </div>

        <canvas id="gameCanvas" width="600" height="500"></canvas>
    </div>

</body>
</html>
